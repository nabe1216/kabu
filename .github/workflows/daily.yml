name: Generate Dividend Signals

# 毎日 19:30 JST = 10:30 UTC に自動実行
# 手動実行も可能（workflow_dispatch）
on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

# results.json をコミットするための権限
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run generate.py
        env:
          J_QUANTS_API_KEY: ${{ secrets.J_QUANTS_API_KEY }}
          TZ: Asia/Tokyo
        run: |
          python scripts/generate.py

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update results.json ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi

      - name: Upload results as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: data/results.json
          retention-days: 14
